name: Build Atlas Linux ISO

on:
  workflow_dispatch: # لتشغيل البناء يدوياً في أي وقت

jobs:
  build-iso:
    runs-on: ubuntu-latest
    
    container:
      image: archlinux:latest
      options: --privileged 

    steps:
      - name: 1. تهيئة السيرفر وتثبيت الأدوات الأساسية ومفاتيح الأمان
        run: |
          pacman -Sy --noconfirm archlinux-keyring
          pacman -Syu --noconfirm
          pacman -S --noconfirm git tar gzip bash squashfs-tools xorriso archiso dosfstools libisoburn

      - name: 2. جلب ملفات السكريبت من المستودع
        uses: actions/checkout@v4

      - name: 3. تشغيل سكريبت بناء أطلس لينكس
        run: |
          chmod +x atlas-linux-build.sh
          bash atlas-linux-build.sh --mode iso

      - name: 4. رفع ملف الـ ISO النهائي لجيت هاب
        uses: actions/upload-artifact@v4
        with:
          name: Atlas-Linux-Phoenix-ISO
          path: |
            *.iso
            atlas-output/*.iso
          retention-days: 7
