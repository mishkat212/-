name: Build Atlas Linux ISO

on:
  workflow_dispatch: # لتشغيل البناء يدوياً في أي وقت

jobs:
  build-iso:
    runs-on: ubuntu-latest # سيرفر أوبونتو المستقر كقاعدة رئيسية

    steps:
      - name: 1. جلب ملفات المشروع من المستودع
        uses: actions/checkout@v4

      - name: 2. فحص وتطهير ملفات السكريبت
        run: |
          echo "=== جاري فحص ملف السكريبت ==="
          sed -i 's/\r$//' atlas-linux-build.sh
          chmod +x atlas-linux-build.sh
          echo "✅ تم التطهير والتحضير بنجاح."

      - name: 3. بناء الأيزو داخل بيئة Arch Linux المستقرة
        run: |
          docker run --privileged --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            quay.io/archlinux/archlinux:latest \
            bash -c "
              set -e
              
              echo '=== 1. تهيئة وتحديث مفاتيح أمان الأرش لينكس ==='
              pacman-key --init
              pacman-key --populate archlinux
              pacman -Sy --noconfirm archlinux-keyring
              
              echo '=== 2. تحديث النظام وتثبيت أدوات البناء مع Sudo ==='
              pacman -Syu --noconfirm
              pacman -S --noconfirm git bash squashfs-tools xorriso archiso dosfstools libisoburn sudo
              
              echo '=== 3. بدء تشغيل السكريبت بوضع كاشف الأخطاء الخطوة بخطوة ==='
              bash -x ./atlas-linux-build.sh --mode iso
            "

      - name: 4. رفع ملف الـ ISO النهائي إلى جيت هاب
        uses: actions/upload-artifact@v4
        with:
          name: Atlas-Linux-Phoenix-ISO
          path: |
            *.iso
            atlas-output/*.iso
          retention-days: 7
