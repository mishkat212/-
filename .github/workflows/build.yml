name: Build Atlas Linux ISO

on:
  workflow_dispatch: # لتشغيل البناء يدوياً في أي وقت

jobs:
  build-iso:
    runs-on: ubuntu-latest # سيرفر أوبونتو المستقر كقاعدة رئيسية

    steps:
      - name: 1. جلب ملفات المشروع من المستودع
        uses: actions/checkout@v4

      - name: 2. تطهير السكريبت وبناء الأيزو داخل بيئة Arch Linux
        run: |
          # أولاً: تنظيف ملف السكريبت من أي علامات سطر زائدة (Windows CRLF) لمنع الخطأ 127
          sed -i 's/\r$//' atlas-linux-build.sh
          
          # ثانياً: تشغيل البيئة، وتثبيت أدوات بناء الأيزو كاملة، ثم بدء البناء في سطر واحد مستقر
          docker run --privileged --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            quay.io/archlinux/archlinux:latest \
            bash -c "pacman -Sy --noconfirm archlinux-keyring && pacman -Syu --noconfirm && pacman -S --noconfirm git bash squashfs-tools xorriso archiso dosfstools libisoburn && bash atlas-linux-build.sh --mode iso"

      - name: 3. رفع ملف الـ ISO النهائي إلى جيت هاب
        uses: actions/upload-artifact@v4
        with:
          name: Atlas-Linux-Phoenix-ISO
          path: |
            *.iso
            atlas-output/*.iso
          retention-days: 7
