name: Build Atlas Linux ISO

on:
  workflow_dispatch: # لتشغيل البناء يدوياً في أي وقت

jobs:
  build-iso:
    runs-on: ubuntu-latest # سيرفر أوبونتو المستقر كقاعدة رئيسية

    steps:
      - name: 1. جلب ملفات المشروع من المستودع
        uses: actions/checkout@v4

      - name: 2. فحص وتطهير ملفات السكريبت
        run: |
          echo "=== جاري البحث عن سكريبت بناء النظام ==="
          if [ -f atlas-linux-build.sh ]; then
            sed -i 's/\r$//' atlas-linux-build.sh
            chmod +x atlas-linux-build.sh
            echo "✅ تم العثور على الملف بنجاح وتطهيره من رموز ويندوز."
          else
            echo "❌ خطأ فادح: ملف atlas-linux-build.sh غير موجود في المستودع كلياً!"
            exit 1
          fi

      - name: 3. بناء الأيزو داخل بيئة Arch Linux المستقرة
        run: |
          docker run --privileged --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            quay.io/archlinux/archlinux:latest \
            bash -c "
              set -e
              echo '=== 1. تحديث قاعدة بيانات الحزم ومفاتيح الأمان ==='
              pacman -Sy --noconfirm archlinux-keyring
              
              echo '=== 2. تثبيت أدوات بناء الأيزو الرسمية (Archiso) ==='
              pacman -Syu --noconfirm
              pacman -S --noconfirm git bash squashfs-tools xorriso archiso dosfstools libisoburn
              
              echo '=== 3. بدء تشغيل سكريبت بناء أطلس لينكس الفعلي ==='
              ./atlas-linux-build.sh --mode iso
            "

      - name: 4. رفع ملف الـ ISO النهائي إلى جيت هاب
        uses: actions/upload-artifact@v4
        with:
          name: Atlas-Linux-Phoenix-ISO
          path: |
            *.iso
            atlas-output/*.iso
          retention-days: 7
