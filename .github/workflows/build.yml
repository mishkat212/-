name: Build Atlas Linux ISO

on:
  workflow_dispatch: # لتشغيل البناء يدوياً في أي وقت

jobs:
  build-iso:
    runs-on: ubuntu-latest # استخدام سيرفر أوبونتو المستقر

    steps:
      - name: 1. جلب ملفات المشروع من المستودع
        uses: actions/checkout@v4

      - name: 2. بناء الأيزو داخل بيئة Arch Linux مستقلة (عبر مستودعات Quay المستقرة)
        run: |
          docker run --privileged --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            quay.io/archlinux/archlinux:latest \
            bash -c "
              echo '=== 1. تحديث مفاتيح أمان الأرش لينكس ===' && \
              pacman -Sy --noconfirm archlinux-keyring && \
              echo '=== 2. تشغيل سكريبت بناء أطلس لينكس ===' && \
              bash atlas-linux-build.sh --mode iso
            "

      - name: 3. رفع ملف الـ ISO النهائي إلى جيت هاب
        uses: actions/upload-artifact@v4
        with:
          name: Atlas-Linux-Phoenix-ISO
          path: |
            *.iso
            atlas-output/*.iso
          retention-days: 7
