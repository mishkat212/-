name: Build Atlas Linux ISO

on:
  workflow_dispatch: # لتشغيل البناء يدوياً في أي وقت

jobs:
  build-iso:
    runs-on: ubuntu-latest

    steps:
      - name: 1. جلب ملفات المشروع من المستودع
        uses: actions/checkout@v4

      - name: 2. إعداد وحقن رقعة المستودعات الشاملة وأنظمة الإقلاع
        run: |
          echo "=== جاري تجهيز رقعة الدمج الكاملة ==="
          sed -i 's/\r$//' atlas-linux-build.sh
          chmod +x atlas-linux-build.sh
          
          # إنشاء سكريبت الحقن الذكي الذي سيعدل ملفات الأيزو قبل الصهر مباشرة
          cat << 'EOF' > patch.sh
          echo "=== 🚀 بدء حقن المستودعات الكبرى داخل ملفات بناء الأيزو ==="
          
          # 1. إصلاح ملف الإعدادات وهيكلة أنظمة الإقلاع الحديثة لتفادي الانهيار القديم
          TARGET_PROFILE="/tmp/atlas-build/profiledef.sh"
          [ ! -f "$TARGET_PROFILE" ] && TARGET_PROFILE="/tmp/atlas-build/profile.def"
          
          if [ -f "$TARGET_PROFILE" ]; then
            sed -i '/boot_modes=(/,/)/d' "$TARGET_PROFILE"
            echo "boot_modes=('bios.syslinux' 'uefi.grub')" >> "$TARGET_PROFILE"
            echo "✅ تم تحديث وتأمين هيكل أنظمة الإقلاع الحديثة."
          fi
          
          # 2. تعديل ملف pacman.conf الخاص بالأيزو لفتح المستودعات وتجاوز حواجز الأمان مؤقتاً
          TARGET_CONF="/tmp/atlas-build/pacman.conf"
          if [ -f "$TARGET_CONF" ]; then
            # تعطيل التواقيع الرقمية داخل الأيزو لضمان قبول حزم AUR دون مشاكل مفاتيح
            sed -i 's/^[[:space:]]*SigLevel[[:space:]]*=.*/SigLevel = Never/g' "$TARGET_CONF"
            
            # تفعيل مستودع الألعاب multilib
            sed -i '/\[multilib\]/,+1 s/^#//' "$TARGET_CONF"
            
            # حقن مستودع Chaotic-AUR السحابي للبرامج الخارجية
            if ! grep -q "\[chaotic-aur\]" "$TARGET_CONF"; then
              echo -e "\n[chaotic-aur]\nSigLevel = Never\nServer = https://cdn-mirror.chaotic.cx/chaotic-aur/\$arch" >> "$TARGET_CONF"
            fi
            
            # حقن مستودع BlackArch لأدوات الحماية والاختراق
            if ! grep -q "\[blackarch\]" "$TARGET_CONF"; then
              echo -e "\n[blackarch]\nSigLevel = Never\nServer = https://blackarch.org/blackarch/\$repo/os/\$arch" >> "$TARGET_CONF"
            fi
            echo "✅ تم بنجاح ربط الأيزو بمستودعات Chaotic-AUR و BlackArch و Multilib."
          fi
          EOF
          
          # حقن تشغيل الرقعة السحرية داخل السكريبت الرئيسي قبل بدء أمر mkarchiso
          sed -i '/mkarchiso -v/i bash /workspace/patch.sh' atlas-linux-build.sh
          echo "✅ تم تجهيز عملية الحقن التلقائي بنجاح."

      - name: 3. بناء الأيزو بكامل الحزم داخل البيئة المجهزة
        run: |
          docker run --privileged --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            quay.io/archlinux/archlinux:latest \
            bash -c "
              set -e
              
              echo '=== 1. تهيئة وتحديث مفاتيح أمان النظام المستضيف ==='
              pacman-key --init
              pacman-key --populate archlinux
              pacman -Sy --noconfirm archlinux-keyring
              
              echo '=== 2. ربط النظام المستضيف بالمستودعات الكبرى لتمرير الفحص ==='
              sed -i 's/^[[:space:]]*SigLevel[[:space:]]*=.*/SigLevel = Never/g' /etc/pacman.conf
              sed -i '/\[multilib\]/,+1 s/^#//' /etc/pacman.conf
              
              echo -e '\n[chaotic-aur]\nSigLevel = Never\nServer = https://cdn-mirror.chaotic.cx/chaotic-aur/\$arch' >> /etc/pacman.conf
              echo -e '\n[blackarch]\nSigLevel = Never\nServer = https://blackarch.org/blackarch/\$repo/os/\$arch' >> /etc/pacman.conf
              
              echo '=== 3. تحديث مستودعات السيرفر وتثبيت أدوات الصهر الكاملة ==='
              pacman -Sy
              pacman -S --noconfirm git bash squashfs-tools xorriso archiso dosfstools libisoburn sudo reflector grub syslinux mtools
              
              echo '=== 4. تشغيل بناء أطلس لينكس بكامل حزمه ومميزاته ==='
              bash -x ./atlas-linux-build.sh --mode iso
            "

      - name: 4. رفع ملف الـ ISO النهائي المكتمل إلى جيت هاب
        uses: actions/upload-artifact@v4
        with:
          name: Atlas-Linux-Phoenix-Full-ISO
          path: |
            *.iso
            atlas-output/*.iso
          retention-days: 7
