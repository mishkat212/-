name: Build Atlas Linux ISO

on:
  workflow_dispatch: # لتشغيل البناء يدوياً في أي وقت

jobs:
  build-iso:
    runs-on: ubuntu-latest

    steps:
      - name: 1. جلب ملفات المشروع من المستودع
        uses: actions/checkout@v4

      - name: 2. فحص وتطهير ملفات السكريبت وحقن إصلاحات التوافقية الشاملة
        run: |
          echo "=== جاري فحص وتعديل ملف السكريبت ==="
          sed -i 's/\r$//' atlas-linux-build.sh
          chmod +x atlas-linux-build.sh
          
          # إنشاء ملف الإصلاح والفلترة الذكية للحزم
          cat << 'EOF' > patch.sh
          echo "=== تشغيل رقعة التوافقية الذكية وتفعيل المستودعات ==="
          
          # 1. تفعيل مستودع multilib (مهم جداً لحزم مثل steam)
          if [ -f /etc/pacman.conf ]; then
            sed -i '/\[multilib\]/,+1 s/^#//' /etc/pacman.conf
            sed -i 's/^[[:space:]]*SigLevel[[:space:]]*=.*/SigLevel = Never/g' /etc/pacman.conf
          fi
          pacman -Sy --noconfirm
          
          # 2. إصلاح ملف الإعدادات وإزالة أوضاع الإقلاع القديمة تماماً
          if [ -f /tmp/atlas-build/profile.def ]; then
            sed -i '/boot_modes=(/,/)/d' /tmp/atlas-build/profile.def
            echo "boot_modes=('bios.syslinux' 'uefi.grub')" >> /tmp/atlas-build/profile.def
          fi
          
          # 3. الفلترة الذكية: حذف أي حزمة غير متوفرة في المستودعات الرسمية لتجنب انهيار البناء
          if [ -f /tmp/atlas-build/packages.x86_64 ]; then
            echo "=== جاري تنظيف قائمة الحزم من الأدوات غير الرسمية (AUR) ==="
            touch /tmp/cleaned_packages.txt
            
            while read -r pkg; do
              # تخطي الأسطر الفارغة والتعليقات
              [[ -z "$pkg" || "$pkg" =~ ^# ]] && echo "$pkg" >> /tmp/cleaned_packages.txt && continue
              
              # التحقق من وجود الحزمة في مستودعات pacman الرسمية
              if pacman -Si "$pkg" >/dev/null 2>&1; then
                echo "$pkg" >> /tmp/cleaned_packages.txt
              else
                echo "⚠️ تم استبعاد حزمة غير رسمية لتفادي فشل البناء: $pkg"
              fi
            done < /tmp/atlas-build/packages.x86_64
            
            # استبدال القائمة القديمة بالجديدة النظيفة
            mv /tmp/cleaned_packages.txt /tmp/atlas-build/packages.x86_64
            
            # التأكد من إضافة حزم الإقلاع الأساسية
            for essential in syslinux grub efibootmgr mtools; do
              if ! grep -q "^$essential$" /tmp/atlas-build/packages.x86_64; then
                echo "$essential" >> /tmp/atlas-build/packages.x86_64
              fi
            done
          fi
          EOF
          
          # حقن تشغيل الـ patch.sh داخل السكريبت الرئيسي قبل سطر mkarchiso مباشرة
          sed -i '/mkarchiso -v/i bash /workspace/patch.sh' atlas-linux-build.sh
          echo "✅ تم تجهيز وحقن رقعة الفلترة الشاملة بنجاح."

      - name: 3. بناء الأيزو داخل بيئة Arch Linux المستقرة
        run: |
          docker run --privileged --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            quay.io/archlinux/archlinux:latest \
            bash -c "
              set -e
              
              echo '=== 1. تهيئة وتحديث مفاتيح أمان الأرش لينكس ==='
              pacman-key --init
              pacman-key --populate archlinux
              pacman -Sy --noconfirm archlinux-keyring
              
              echo '=== 2. تحديث النظام وتثبيت أدوات البناء الكاملة ==='
              # تفعيل multilib للمستضيف أيضاً لضمان التوافق التام
              sed -i '/\[multilib\]/,+1 s/^#//' /etc/pacman.conf
              pacman -Syu --noconfirm
              pacman -S --noconfirm git bash squashfs-tools xorriso archiso dosfstools libisoburn sudo reflector grub syslinux mtools
              
              echo '=== 3. تجهيز ملف المرايا (Mirrorlist) لسرعة التحميل ==='
              reflector --latest 5 --protocol https --sort rate --save /etc/pacman.d/mirrorlist
              
              echo '=== 4. بدء تشغيل السكريبت بوضع كاشف الأخطاء خطوة بخطوة ==='
              bash -x ./atlas-linux-build.sh --mode iso
            "

      - name: 4. رفع ملف الـ ISO النهائي إلى جيت هاب
        uses: actions/upload-artifact@v4
        with:
          name: Atlas-Linux-Phoenix-ISO
          path: |
            *.iso
            atlas-output/*.iso
          retention-days: 7
